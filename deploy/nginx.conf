# Nginx config for TOCFL FlashcardApp on Raspberry Pi
#
# 1. Copy this file to /etc/nginx/sites-available/tocfl
# 2. Run: sudo ln -s /etc/nginx/sites-available/tocfl /etc/nginx/sites-enabled/tocfl
# 3. Run: sudo rm -f /etc/nginx/sites-enabled/default
# 4. Run: sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS, after pointing your DuckDNS domain at the Pi run:
#   sudo certbot --nginx -d yourname.duckdns.org

server {
    listen 80;
    server_name _;  # Replace _ with yourname.duckdns.org once DNS is set up

    root /var/www/tocfl;
    index index.html;

    # Serve the React SPA — send all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Express server
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
